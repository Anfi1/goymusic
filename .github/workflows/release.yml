name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Version determination ---
      - name: Determine version
        id: version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
            echo "bumped=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TAG_VERSION="${LATEST_TAG#v}"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
            echo "bumped=false" >> $GITHUB_OUTPUT
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$PKG_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "bumped=true" >> $GITHUB_OUTPUT

            node -e "const p=require('./package.json');p.version='$NEW_VERSION';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          fi

      # --- Python embedded environment ---
      - name: Setup Python 3.13 embedded
        shell: pwsh
        run: |
          $pyVer = "3.13.2"
          $url = "https://www.python.org/ftp/python/$pyVer/python-$pyVer-embed-amd64.zip"

          New-Item -ItemType Directory -Force -Path python\bin
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python\bin -Force

          # Enable pip in embedded Python
          $pthFile = "python\bin\python313._pth"
          $content = Get-Content $pthFile
          $content | Set-Content $pthFile
          Add-Content $pthFile "Lib\site-packages"
          Add-Content $pthFile "import site"

          # Install pip
          Invoke-WebRequest -Uri https://bootstrap.pypa.io/get-pip.py -OutFile get-pip.py
          python\bin\python.exe get-pip.py --no-warn-script-location

          # Install requirements
          $env:PYTHONPATH = "$PWD\python\fork"
          python\bin\python.exe -m pip install -r python\requirements.txt --no-warn-script-location

      # --- Node.js build ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # --- Package & Release ---
      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Push version bump ---
      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag -f "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}" --force
