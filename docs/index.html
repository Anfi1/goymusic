<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoyMusic</title>

  <!-- Discord / Open Graph preview -->
  <meta property="og:site_name" content="GoyMusic" />
  <meta property="og:title" content="Open in GoyMusic" />
  <meta property="og:description" content="Listen on GoyMusic desktop app or YouTube Music" />
  <meta name="theme-color" content="#1e1e2e" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #cba6f7;
    }

    .card {
      background: #313244;
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .status {
      font-size: 1rem;
      color: #a6adc8;
      min-height: 1.4em;
    }

    .dot {
      display: inline-block;
      animation: blink 1.2s step-end infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #cba6f7; color: #1e1e2e; }
    .btn-secondary { background: #45475a; color: #cdd6f4; }

    .buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .sub {
      font-size: 0.78rem;
      color: #6c7086;
    }
  </style>
</head>
<body>
  <div class="logo">GoyMusic</div>

  <div class="card">
    <div class="status" id="status">
      Opening app<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
    </div>
    <div class="buttons" id="buttons" style="display:none">
      <a class="btn btn-primary" id="openApp" href="#">Open in GoyMusic</a>
      <a class="btn btn-secondary" id="openYT" href="#" target="_blank" rel="noopener">Open in YouTube Music</a>
    </div>
    <div class="sub" id="sub"></div>
  </div>

  <script>
    const hash = window.location.hash.slice(1); // убираем #
    const parts = hash.split('/');
    const type = parts[0];
    const id = parts[1];

    const statusEl = document.getElementById('status');
    const buttonsEl = document.getElementById('buttons');
    const subEl = document.getElementById('sub');
    const openAppBtn = document.getElementById('openApp');
    const openYTBtn = document.getElementById('openYT');

    let protocolUrl = '';
    let fallbackUrl = '';

    if (type === 'track' && id) {
      protocolUrl = `goymusic://track/${id}`;
      fallbackUrl = `https://music.youtube.com/watch?v=${id}`;
    } else if (type === 'album' && id) {
      protocolUrl = `goymusic://album/${id}`;
      fallbackUrl = `https://music.youtube.com/browse/${id}`;
    }

    if (!protocolUrl) {
      statusEl.textContent = 'Invalid link.';
    } else {
      openAppBtn.href = protocolUrl;
      openYTBtn.href = fallbackUrl;

      // Пробуем открыть протокол
      window.location.href = protocolUrl;

      // Через 1.5с показываем кнопки и редиректим на YT Music
      setTimeout(() => {
        statusEl.textContent = 'GoyMusic не установлен?';
        buttonsEl.style.display = 'flex';
        subEl.textContent = 'Перенаправляем на YouTube Music...';

        setTimeout(() => {
          window.location.href = fallbackUrl;
        }, 2000);
      }, 1500);
    }
  </script>
</body>
</html>
